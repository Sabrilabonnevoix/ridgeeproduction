<main class="container">
  <h1>Contact</h1>
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:24px">
    <div class="card">
      <form class="form" action="https://formspree.io/f/xvgbypwy" method="POST">
        <input type="hidden" name="_redirect" value="https://ridgeeproduction.com/merci.html">
        <label>Votre nom<input type="text" name="name" required></label>
        <label>Email<input type="email" name="email" required></label>
        <label>Sujet<input type="text" name="subject" required></label>
        <label>Message<textarea name="message" rows="7" required></textarea></label>
        <button class="btn brand" type="submit">Envoyer</button>
      </form>
      <p class="small mono" style="margin-top:8px">Nous répondons sous 24–48h ouvrées.</p>
    </div>

    <div class="card">
      <h2>Coordonnées</h2>
      <p><b>Email</b> : <a href="mailto:contact@ridgeeproduction.com">contact@ridgeeproduction.com</a><br>
         <b>Tél</b> : <a href="tel:+33610472999">+33 6 10 47 29 99</a></p>
      <p><b>Adresse</b> : 13 rue Pierre Mauroy, 75018 Paris</p>
      <img src="/Sabri.jpg" alt="Ridgee Production — Contact">
    </div>
  </div>
</main>

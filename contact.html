<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Ridgee Production</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header>
    <a href="index.html">
      <img src="assets/img/logo-ridgee.jpg" alt="Logo Ridgee Production" style="height:60px">
    </a>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="about.html">À propos</a>
      <a href="shows.html">Shows</a>
      <a href="references.html">Références</a>
      <a href="booking.html">Booking</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main style="max-width:800px;margin:50px auto;padding:20px">
    <h1>Contact</h1>
    <p>Vous souhaitez organiser un show, un événement corporate, ou discuter d’une collaboration ?  
    Contactez-nous directement par le formulaire ci-dessous.</p>

    <form id="contact-form" action="https://formspree.io/f/xvgbypwy" method="POST">
      <label>Nom / Société<br>
        <input required name="name" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px">
      </label><br><br>

      <label>Email<br>
        <input required type="email" name="email" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px">
      </label><br><br>

      <label>Téléphone<br>
        <input name="phone" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px">
      </label><br><br>

      <label>Ville / Lieu<br>
        <input name="city" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px">
      </label><br><br>

      <label>Votre besoin<br>
        <textarea required name="message" rows="6" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px"></textarea>
      </label><br><br>

      <!-- Options utiles -->
      <input type="hidden" name="_subject" value="Devis / Contact — ridgeeproduction.com">
      <input type="hidden" name="_language" value="fr">

      <!-- Honeypot anti-spam -->
      <input type="text" name="_gotcha" style="display:none">

      <button class="btn" type="submit">Envoyer</button>
      <div id="form-status" style="margin-top:10px;color:#888"></div>
    </form>
  </main>

  <footer style="text-align:center;padding:20px;font-size:14px;color:#666">
    © 2025 Ridgee Production — Entertainment & Artistic Direction
  </footer>

  <script>
  const form = document.getElementById('contact-form');
  const statusEl = document.getElementById('form-status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.textContent = 'Envoi en cours...';
    const data = new FormData(form);

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        statusEl.style.color = '#0a7d29';
        statusEl.textContent = 'Merci ! Votre message a bien été envoyé.';
        form.reset();
      } else {
        const err = await res.json().catch(()=>({}));
        statusEl.style.color = '#c0392b';
        statusEl.textContent = err && err.errors ? err.errors.map(e=>e.message).join(', ') : 'Une erreur est survenue. Réessayez.';
      }
    } catch (e2) {
      statusEl.style.color = '#c0392b';
      statusEl.textContent = 'Impossible d’envoyer le message (connexion).';
    }
  });
  </script>
</body>
</html>


<footer>…</footer>

</body></html>

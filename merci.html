<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — Ridgee Production</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #fafafa;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 {
      color: #e91e63;
      margin-bottom: 15px;
    }
    p {
      font-size: 18px;
      color: #444;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      padding: 12px 25px;
      background: #e91e63;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.3s ease;
    }
    a:hover {
      background: #c2185b;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Merci 🎉</h1>
    <p>Votre message a bien été envoyé.<br>
    Nous vous répondrons dans les plus brefs délais.</p>
    <a href="index.html">Retour à l’accueil</a>
  </div>
</body>
</html>
